[bumpversion]
current_version = 0.1.6

[bumpversion:file:Cargo.toml]
search = 'version = "{current_version}"'
replace = 'version = "{new_version}"'

[bumpversion:file:README.md]
search = 'ipcap {current_version}'
replace = 'ipcap {new_version}'

[bumpversion:file:README.md]
search = 'ipcap = "{current_version}"'
replace = 'ipcap = "{new_version}"'
